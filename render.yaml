services:
  # Backend: FastAPI Web Service
  - type: web
    name: smarthr-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend: React Static Site
  - type: web
    name: smarthr-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Proxy all /api requests to the backend service
      # NOTE: After your first deployment, replace 'smarthr-api.onrender.com' 
      # with your actual backend URL if it differs.
      - type: rewrite
        source: /api/*
        destination: https://smarthr-api.onrender.com/api/*
      # Single Page Application routing (fallback to index.html)
      - type: rewrite
        source: /*
        destination: /index.html
